# Gradle properties for TermuxForge Flutter project

# Use AndroidX
android.useAndroidX=true

# Enable Jetifier for legacy dependencies
android.enableJetifier=true

# Kotlin code style
kotlin.code.style=official

# Gradle JVM args (optimized for CI and Termux)
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError

# Enable Gradle daemon for local builds
org.gradle.daemon=true

# Enable build cache
org.gradle.caching=true

# Enable parallel execution
org.gradle.parallel=true

# Enable configuration cache (Gradle 8+)
org.gradle.configuration-cache=false
